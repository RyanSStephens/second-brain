name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src/
      - name: Mypy
        run: mypy src/ --ignore-missing-imports --no-strict --allow-untyped-defs

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest tests/test_parsers.py tests/test_chunker.py tests/test_auth.py -v

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t second-brain:latest .
      - name: Verify image
        run: docker run --rm second-brain:latest python -c "from second_brain.api.app import app; print('OK')"
